
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>xBOARD</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        background: '#09090b', 
        panel: '#111113', 
        border: '#27272a',
        accent: '#67e8f9', 
        textMain: '#e4e4e7', 
        textMuted: '#a1a1aa',
        trow1: '#111113',
        trow2: '#18181b',
        thead: '#0f0f0f', 
      },
      fontFamily: {
        mono: ['Courier New', 'monospace'],
        sans: ['Verdana', 'Tahoma', 'Arial', 'sans-serif']
      },
      fontSize: {
        'xxs': '9px',
        'xs': '10px',
        'sm': '11px',
        'base': '12px',
        'lg': '13px',
        'xl': '15px',
        '2xl': '17px',
      },
      backgroundImage: {
         'gloss': 'linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%)',
         'thead-grad': 'linear-gradient(to bottom, #18181b 0%, #09090b 100%)',
         'cat-grad': 'linear-gradient(to right, #67e8f9 0%, #09090b 100%)', 
      },
      borderRadius: {
        DEFAULT: '0px',
        sm: '0px',
        md: '0px',
        lg: '0px',
        xl: '0px',
        full: '9999px'
      }
    }
  }
}
</script>
<style>
  body {
    background-color: #09090b;
    color: #e4e4e7;
    font-family: 'Verdana', 'Tahoma', sans-serif;
    font-size: 12px;
  }
  
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #09090b; border-left: 1px solid #27272a; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border: 1px solid #18181b; }
  ::-webkit-scrollbar-thumb:hover { background: #67e8f9; }

  input, textarea, select {
    background-color: #111113 !important;
    border: 1px solid #27272a !important;
    color: #fff !important;
    font-size: 11px !important;
    padding: 4px 6px !important;
    border-radius: 0 !important;
    font-family: 'Verdana', sans-serif !important;
  }
  input:focus, textarea:focus, select:focus {
    outline: 1px solid #67e8f9;
    border-color: #67e8f9 !important;
    background-color: #18181b !important;
  }

  a { text-decoration: none; color: #e4e4e7; transition: color 0.2s; }
  a:hover { text-decoration: none; color: #67e8f9; }

  table { width: 100%; border-collapse: separate; border-spacing: 1px; background: #27272a; margin-bottom: 10px; }
  th { background: #18181b; color: #fff; padding: 6px; font-weight: bold; border: 1px solid #09090b; font-size: 11px; text-align: left; }
  td { padding: 6px; font-size: 11px; vertical-align: middle; }

  .tborder { background: #09090b; border: 1px solid #27272a; }
  .thead { background: #18181b; color: #fff; font-weight: bold; padding: 6px; border-bottom: 1px solid #09090b; }
  .tcat { background: #111113; border-top: 2px solid #67e8f9; border-bottom: 1px solid #27272a; color: #67e8f9; padding: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .trow1 { background: #111113; }
  .trow2 { background: #18181b; }
  .tfoot { background: #09090b; color: #a1a1aa; padding: 6px; border-top: 1px solid #27272a; }
  
  .smalltext { font-size: 10px; }
  .largetext { font-size: 14px; font-weight: bold; }
</style>
<script type="importmap">
{
  "imports": {
    "path": "https://esm.sh/path@^0.12.7",

    "react": "https://esm.sh/react@^19.2.4",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-toastify": "https://esm.sh/react-toastify@^11.0.5",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "react-toastify/": "https://esm.sh/react-toastify@^11.0.5/"
  }
}
</script>
